<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجوم</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a2342">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="نجوم">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
/* ══════════════ THEMES ══════════════ */
:root {
  --bg1:#0a2342; --bg2:#0d3b6e;
  --surf:rgba(0,60,120,.55);
  --ink:#cceeff; --ink2:#38bdf8;
  --card:rgba(255,255,255,.13);
  --csh:0 6px 28px rgba(0,0,0,.38);
  --csh-h:0 18px 55px rgba(0,180,255,.32);
  --btn:rgba(56,189,248,.22); --btn-h:rgba(56,189,248,.55);
  --accent:#38bdf8;
  --word-btn:linear-gradient(135deg,#0369a1,#0ea5e9);
  --r:22px;
}
body.t-cosmic{--bg1:#0d0221;--bg2:#1a0533;--surf:rgba(80,0,160,.38);--ink:#e0c3fc;--ink2:#d946ef;--card:rgba(255,255,255,.09);--csh:0 6px 28px rgba(0,0,0,.55);--csh-h:0 18px 55px rgba(217,70,239,.42);--btn:rgba(217,70,239,.18);--btn-h:rgba(217,70,239,.45);--accent:#d946ef;--word-btn:linear-gradient(135deg,#6b21a8,#d946ef)}
body.t-spring{--bg1:#fce4ec;--bg2:#f8bbd9;--surf:rgba(255,255,255,.72);--ink:#880e4f;--ink2:#e91e8c;--card:#fff;--csh:0 6px 28px rgba(233,30,140,.14);--csh-h:0 18px 55px rgba(233,30,140,.28);--btn:rgba(233,30,140,.12);--btn-h:rgba(233,30,140,.28);--accent:#e91e8c;--word-btn:linear-gradient(135deg,#be185d,#f472b6)}
body.t-sunset{--bg1:#1c0400;--bg2:#7c2d12;--surf:rgba(255,255,255,.11);--ink:#fff7ed;--ink2:#fbbf24;--card:rgba(255,255,255,.11);--csh:0 6px 28px rgba(0,0,0,.45);--csh-h:0 18px 55px rgba(251,191,36,.38);--btn:rgba(251,191,36,.16);--btn-h:rgba(251,191,36,.38);--accent:#fbbf24;--word-btn:linear-gradient(135deg,#92400e,#fbbf24)}
body.t-candy{--bg1:#fff0f6;--bg2:#fdf4ff;--surf:rgba(255,255,255,.78);--ink:#701a75;--ink2:#e879f9;--card:#fff;--csh:0 6px 28px rgba(232,121,249,.14);--csh-h:0 18px 55px rgba(232,121,249,.3);--btn:rgba(232,121,249,.12);--btn-h:rgba(232,121,249,.3);--accent:#e879f9;--word-btn:linear-gradient(135deg,#a21caf,#e879f9)}
body.t-jungle{--bg1:#052e16;--bg2:#14532d;--surf:rgba(255,255,255,.10);--ink:#d1fae5;--ink2:#34d399;--card:rgba(255,255,255,.09);--csh:0 6px 28px rgba(0,0,0,.45);--csh-h:0 18px 55px rgba(52,211,153,.38);--btn:rgba(52,211,153,.16);--btn-h:rgba(52,211,153,.38);--accent:#34d399;--word-btn:linear-gradient(135deg,#065f46,#34d399)}
body.t-arctic{--bg1:#e0f2fe;--bg2:#f0f9ff;--surf:rgba(255,255,255,.72);--ink:#0c4a6e;--ink2:#0ea5e9;--card:#fff;--csh:0 6px 28px rgba(14,165,233,.15);--csh-h:0 18px 55px rgba(14,165,233,.3);--btn:rgba(14,165,233,.12);--btn-h:rgba(14,165,233,.3);--accent:#0ea5e9;--word-btn:linear-gradient(135deg,#0369a1,#38bdf8)}

/* ══════════════ BASE ══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Cairo',sans-serif;user-select:none}
body{background:linear-gradient(145deg,var(--bg1),var(--bg2));transition:background .6s}

#bgLayer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}

/* ══════════════ HEADER ══════════════ */
header{
  position:relative;z-index:20;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 24px;
  background:var(--surf);
  backdrop-filter:blur(20px);
  border-bottom:1.5px solid rgba(255,255,255,.16);
  gap:12px;
  height:66px;
  transition:background .5s;
}

/* ── CAT TABS (icon only) ── */
.cat-tabs{display:flex;gap:8px}
.cat-tab{
  width:54px;height:46px;
  border:2.5px solid transparent;border-radius:14px;
  background:var(--btn);
  color:var(--ink);
  font-family:'Cairo',sans-serif;font-weight:900;
  font-size:22px;line-height:1;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.cat-tab:hover{background:var(--btn-h);transform:scale(1.1)}
.cat-tab.on{border-color:var(--accent);background:var(--btn-h);transform:scale(1.08)}
.cat-tab:active{transform:scale(.9)!important}

/* ── THEME PICKER ── */
.theme-row{display:flex;gap:8px;align-items:center}
.th-btn{
  width:42px;height:42px;
  border-radius:12px;
  border:2.5px solid transparent;
  cursor:pointer;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 3px 10px rgba(0,0,0,.22);
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.th-btn:hover{transform:scale(1.18);box-shadow:0 6px 18px rgba(0,0,0,.28)}
.th-btn.on{
  border-color:#fff;
  transform:scale(1.22);
  box-shadow:0 0 0 3px rgba(255,255,255,.35),0 6px 18px rgba(0,0,0,.3)
}
.th-btn:active{transform:scale(.88)!important}
.th-btn svg{width:22px;height:22px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}

/* ── RIGHT CONTROLS (icon only) ── */
.r-controls{display:flex;gap:8px}
.icon-btn{
  width:44px;height:44px;border-radius:13px;
  border:2px solid rgba(255,255,255,.25);
  background:var(--btn);color:var(--ink);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.icon-btn:hover{background:var(--btn-h);transform:scale(1.1)}
.icon-btn:active{transform:scale(.88)}
.icon-btn.on{border-color:var(--accent);background:var(--btn-h)}

/* ══════════════ LAYOUT ══════════════ */
main{
  position:relative;z-index:10;
  height:calc(100vh - 66px - 88px); /* header + word-bar */
  overflow:hidden;
}

/* ══════════════ GRID VIEW ══════════════ */
#gridView{
  height:100%;overflow-y:auto;
  padding:22px 28px 18px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
  gap:12px;
  align-content:start;
}
#gridView.cat-numbers{
  grid-template-columns:repeat(10,1fr);
  gap:10px;
  padding:18px 20px;
}
#gridView.cat-numbers .lc-char{
  font-size:clamp(24px,3vw,44px);
}
#gridView.cat-numbers .letter-card{
  height:110px;
}
#gridView::-webkit-scrollbar{width:6px}
#gridView::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:6px}

.letter-card{
  height:130px;                     /* fixed height — no aspect-ratio */
  background:var(--card);
  border-radius:var(--r);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;
  border:3px solid transparent;
  box-shadow:var(--csh);
  transition:transform .18s cubic-bezier(.34,1.56,.64,1),
             box-shadow .18s,border-color .18s,background .4s;
  position:relative;overflow:hidden;
  flex-shrink:0;
}
.letter-card::after{
  content:'';position:absolute;inset:0;
  background:var(--cc,#fff);opacity:0;
  transition:opacity .2s;pointer-events:none;
}
.letter-card:hover{transform:translateY(-6px) scale(1.05);box-shadow:var(--csh-h);border-color:var(--cc,transparent)}
.letter-card:hover::after{opacity:.09}
.letter-card:active{transform:scale(.88)!important}
.letter-card.lit{border-color:var(--cc,#fff);box-shadow:0 0 0 5px color-mix(in srgb,var(--cc,#fff) 22%,transparent),var(--csh-h)}
.letter-card.lit::after{opacity:.12}

.lc-char{
  font-size:clamp(44px,5.5vw,72px);
  font-weight:900;line-height:1;
  color:var(--cc,var(--ink));
  position:relative;z-index:1;
  transition:transform .2s,color .4s;
  margin-bottom:4px;
}
.letter-card.lit .lc-char,.letter-card.pop .lc-char{transform:scale(1.14)}
.lc-word{
  font-size:11px;font-weight:700;
  color:var(--cc,var(--ink));opacity:.45;
  text-align:center;padding:0 6px;
  position:relative;z-index:1;line-height:1.1;
  max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
@keyframes cardPop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1.1)}}
.letter-card.pop{animation:cardPop .36s cubic-bezier(.34,1.56,.64,1)}

/* ══════════════ STRIP VIEW ══════════════ */
#stripView{
  height:100%;display:none;
  flex-direction:column;           /* vertical: dots → track → nav */
  align-items:center;
  justify-content:center;
  position:relative;
  gap:0;
}

/* dots — absolute top */
.strip-dots{
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:5px;z-index:30;
}
.strip-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:background .3s,transform .3s}
.strip-dot.on{background:var(--accent);transform:scale(1.5)}

/* TRACK — horizontal row of slots */
.strip-track{
  display:flex;
  flex-direction:row;             /* slots side by side */
  align-items:flex-start;         /* tops aligned */
  justify-content:center;
  gap:16px;
  width:100%;
  padding:30px 20px 70px;
}

/* SLOT = vertical column: letter card + image card */
.strip-slot{
  display:flex;flex-direction:column;
  align-items:center;
  gap:10px;
  flex-shrink:0;
  transition:all .36s cubic-bezier(.34,1.56,.64,1);
}
.strip-slot.pos-far  {opacity:.38;transform:scale(.72)}
.strip-slot.pos-near {opacity:.74;transform:scale(.88)}
.strip-slot.pos-center{opacity:1; transform:scale(1)}

/* LETTER CARD */
.strip-card{
  background:var(--card);border-radius:22px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;border:3px solid transparent;
  box-shadow:var(--csh);
  transition:all .34s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;position:relative;flex-shrink:0;
  gap:4px;
}
.strip-card::after{content:'';position:absolute;inset:0;background:var(--cc,#fff);opacity:0;pointer-events:none}

.strip-slot.pos-far  .strip-card{width:100px;height:100px}
.strip-slot.pos-near .strip-card{width:150px;height:150px}
.strip-slot.pos-center .strip-card{
  width:210px;height:210px;
  border-color:var(--cc,var(--accent));
  box-shadow:0 0 0 6px color-mix(in srgb,var(--cc,var(--accent)) 18%,transparent),0 20px 55px rgba(0,0,0,.3);
}
.strip-slot.pos-center .strip-card::after{opacity:.07}
.strip-slot .strip-card:hover{transform:scale(1.06)}
.strip-slot .strip-card:active{transform:scale(.92)}

.sc-char{font-weight:900;font-family:'Cairo',sans-serif;color:var(--cc,var(--ink));line-height:1;position:relative;z-index:1}
.strip-slot.pos-far  .sc-char{font-size:38px}
.strip-slot.pos-near .sc-char{font-size:62px}
.strip-slot.pos-center .sc-char{font-size:100px}

.sc-word{font-weight:700;color:var(--cc,var(--ink));opacity:.55;position:relative;z-index:1}
.strip-slot.pos-far  .sc-word{font-size:9px;opacity:.3}
.strip-slot.pos-near .sc-word{font-size:12px}
.strip-slot.pos-center .sc-word{font-size:16px}

/* IMAGE CARD */
.strip-img-card{
  background:var(--card);border-radius:18px;
  border:3px solid transparent;
  box-shadow:var(--csh);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all .34s cubic-bezier(.34,1.56,.64,1);
  flex-shrink:0;overflow:hidden;padding:6px;
}
.strip-slot.pos-far  .strip-img-card{width:100px;height:80px}
.strip-slot.pos-near .strip-img-card{width:150px;height:120px}
.strip-slot.pos-center .strip-img-card{
  width:210px;height:168px;
  border-color:var(--cc,var(--accent));
  box-shadow:0 0 0 4px color-mix(in srgb,var(--cc,var(--accent)) 14%,transparent),0 12px 32px rgba(0,0,0,.22);
}
.strip-img-card img{width:100%;height:100%;object-fit:contain;border-radius:10px;display:block}
.strip-img-card svg{width:100%;height:100%;display:block}

/* NAV — absolute bottom */
.strip-nav{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:18px;z-index:30;
}
.nav-btn{
  width:52px;height:52px;border:none;border-radius:50%;
  background:var(--accent);color:var(--bg1);
  font-size:22px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  transition:transform .15s,background .4s;
}
.nav-btn:hover{transform:scale(1.12)}
.nav-btn:active{transform:scale(.88)}
.nav-btn:disabled{background:rgba(255,255,255,.15);color:rgba(255,255,255,.3);cursor:default;transform:none;box-shadow:none}
.strip-counter{font-family:'Fredoka One',cursive;font-size:16px;color:var(--ink);opacity:.45;min-width:52px;text-align:center}

@keyframes sPulse{0%,100%{transform:scale(1)}40%{transform:scale(1.06)}}
.strip-slot.pos-center .strip-card.speaking{animation:sPulse .45s ease}

/* ══════════════ WORD BUTTON BAR ══════════════ */
#wordBar{
  position:relative;z-index:20;
  height:88px;
  display:flex;align-items:center;justify-content:center;
  padding:10px 28px;
  background:var(--surf);
  backdrop-filter:blur(16px);
  border-top:1.5px solid rgba(255,255,255,.14);
  transition:background .5s;
}
#wordBtn{
  flex:1;max-width:700px;height:62px;
  background:var(--word-btn);
  border:none;border-radius:18px;
  display:flex;align-items:center;justify-content:center;gap:16px;
  cursor:pointer;
  box-shadow:0 6px 24px rgba(0,0,0,.28);
  transition:transform .16s,box-shadow .16s,opacity .3s;
  padding:0 28px;
  overflow:hidden;
}
#wordBtn:hover{transform:scale(1.03);box-shadow:0 10px 36px rgba(0,0,0,.35)}
#wordBtn:active{transform:scale(.95)}
.wb-icon{font-size:30px;flex-shrink:0}
.wb-text{
  font-family:'Cairo',sans-serif;font-weight:900;font-size:clamp(18px,3vw,26px);
  color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:calc(100% - 60px);
  letter-spacing:.5px;
}
@keyframes btnPop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
#wordBtn.pop{animation:btnPop .3s ease}
#wordBtn{transition:transform .16s,box-shadow .16s,opacity .25s}



/* ══ INSTALL BUTTON ══ */
#installBtn{
  width:44px;height:44px;border-radius:13px;
  border:2px solid rgba(255,255,255,.25);
  background:var(--btn);color:var(--ink);
  font-size:22px;cursor:pointer;
  display:none; /* hidden until prompt fires */
  align-items:center;justify-content:center;
  transition:all .2s;
}
#installBtn:hover{background:var(--btn-h);transform:scale(1.1)}
#installBtn:active{transform:scale(.88)}

/* ══════════════ FX ══════════════ */
.ripple-ring{
  position:fixed;border-radius:50%;pointer-events:none;border:4px solid;
  transform:translate(-50%,-50%) scale(0);
  animation:ripOut .52s ease-out forwards;z-index:999;
}
@keyframes ripOut{to{transform:translate(-50%,-50%) scale(5);opacity:0}}
.cf{position:fixed;top:-18px;z-index:1000;border-radius:3px;pointer-events:none;animation:cfFall linear forwards}
@keyframes cfFall{to{transform:translateY(112vh) rotate(720deg);opacity:0}}

/* ══════════════ BG ANIMATIONS ══════════════ */
.bubble-p{position:absolute;bottom:-10%;border-radius:50%;background:rgba(56,189,248,.18);border:1.5px solid rgba(56,189,248,.32);animation:riseUp linear infinite}
@keyframes riseUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:1}90%{opacity:.55}100%{transform:translateY(-110vh) scale(1.3);opacity:0}}

.star-p{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.12;transform:scale(1)}to{opacity:.95;transform:scale(1.5)}}
.shoot-p{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;box-shadow:0 0 6px 2px #e0c3fc;animation:shoot linear forwards}
@keyframes shoot{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(180px,100px)}}

.petal-p{position:absolute;top:-5%;border-radius:50% 0 50% 0;animation:petalFall linear infinite;opacity:.7}
@keyframes petalFall{0%{transform:translateY(0) rotate(0) translateX(0);opacity:.8}50%{transform:translateY(50vh) rotate(180deg) translateX(30px);opacity:.6}100%{transform:translateY(108vh) rotate(360deg) translateX(-20px);opacity:0}}

.ember-p{position:absolute;bottom:0;border-radius:50%;animation:emberRise linear infinite}
@keyframes emberRise{0%{transform:translateY(0) scale(1);opacity:0}15%{opacity:.9}80%{opacity:.4}100%{transform:translateY(-100vh) translateX(35px) scale(.25);opacity:0}}

.candy-p{position:absolute;border-radius:50%;animation:candyBounce ease-in-out infinite alternate;opacity:.45}
@keyframes candyBounce{from{transform:translateY(0) rotate(0)}to{transform:translateY(-55px) rotate(22deg)}}

.firefly-p{position:absolute;border-radius:50%;background:#fde68a;box-shadow:0 0 10px 4px #fde68a;animation:firefly ease-in-out infinite}
@keyframes firefly{0%,100%{opacity:0;transform:translate(0,0)}25%{opacity:1}50%{opacity:.25;transform:translate(22px,-16px)}75%{opacity:.85;transform:translate(-12px,-32px)}}
.leaf-p{position:absolute;top:-5%;width:14px;height:8px;background:#16a34a;border-radius:50% 0;animation:leafFall linear infinite;opacity:.55}
@keyframes leafFall{0%{transform:translateY(0) rotate(0) translateX(0)}50%{transform:translateY(50vh) rotate(130deg) translateX(22px)}100%{transform:translateY(108vh) rotate(280deg) translateX(-14px);opacity:0}}

.snow-p{position:absolute;top:-5%;color:#7dd3fc;animation:snowFall linear infinite;opacity:.65}
@keyframes snowFall{0%{transform:translateY(0) rotate(0) translateX(0);opacity:.7}50%{transform:translateY(50vh) rotate(200deg) translateX(18px);opacity:.45}100%{transform:translateY(110vh) rotate(400deg) translateX(-12px);opacity:0}}
</style>
</head>
<body>

<div id="bgLayer"></div>

<!-- ══ HEADER ══ -->
<header>

  <!-- CAT TABS: icon only -->
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab on" data-cat="arabic"  onclick="switchCat('arabic')"  title="حروف عربية">أ</button>
    <button class="cat-tab"    data-cat="english" onclick="switchCat('english')" title="English">A</button>
    <button class="cat-tab"    data-cat="numbers" onclick="switchCat('numbers')" title="أرقام">١</button>
  </div>

  <!-- THEME PICKER: rounded square icon buttons -->
  <div class="theme-row">
    <button class="th-btn on" data-t="ocean"  onclick="setTheme('ocean')"  style="background:linear-gradient(135deg,#0369a1,#38bdf8)" title="محيط">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"><path d="M2 12 C5 9,8 15,12 12 S19 9,22 12"/><path d="M2 17 C5 14,8 20,12 17 S19 14,22 17"/><path d="M2 7 C5 4,8 10,12 7 S19 4,22 7"/></svg>
    </button>
    <button class="th-btn" data-t="cosmic" onclick="setTheme('cosmic')" style="background:linear-gradient(135deg,#1e0040,#7c3aed)" title="كوني">
      <svg viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="2"/><circle cx="5" cy="5" r="1"/><circle cx="19" cy="4" r="1.2"/><circle cx="20" cy="17" r="0.9"/><circle cx="4" cy="18" r="1.1"/><circle cx="12" cy="3" r="0.8"/><circle cx="21" cy="10" r="0.7"/><circle cx="3" cy="12" r="0.7"/><path d="M12 10 L13 7 L14 10 L17 10 L14.5 12 L15.5 15 L12 13 L8.5 15 L9.5 12 L7 10 Z" fill="white" opacity=".6"/></svg>

/* ══════════════════════════════════════
   AUDIO SYSTEM
   Arabic letters  → مضمّن في الملف (صوت بشري حقيقي)
   English/Numbers → Google Translate TTS fallback
══════════════════════════════════════ */
let _audio = null;
let _lastKey = '';
const _cache = {};

function _stopAudio(){
  if(_audio){ _audio.pause(); _audio.src=''; _audio=null; }
  speechSynthesis.cancel();
}

function _setLoading(on){
  document.getElementById('wordBtn').style.opacity = on ? '.55' : '1';
}

function _playB64(b64){
  _stopAudio();
  _audio = new Audio(b64);
  _audio.play();
}

function _gtSpeak(text, lang){
  _stopAudio();
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`;
  _audio = new Audio(url);
  _audio.play().catch(()=>{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang==='ar' ? 'ar-SA' : 'en-US';
    u.rate = 0.82;
    speechSynthesis.speak(u);
  });
}

function _speak(text, lang, b64key){
  const key = (b64key||'') + lang + text;
  if(key === _lastKey && (Date.now()-(_speak._t||0)) < 400) return;
  _lastKey = key; _speak._t = Date.now();
  if(b64key && AR_AUDIO[b64key]){
    _playB64(AR_AUDIO[b64key]);
  } else {
    _setLoading(true);
    const a = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=${lang}&client=tw-ob`);
    _audio = a;
    a.oncanplaythrough = ()=>{ _setLoading(false); a.play(); };
    a.onerror = ()=>{ _setLoading(false); };
    a.load();
  }
}

function speakLetter(it){
  const isEn = G.cat==='english' || G.lang==='en';
  if(G.cat==='arabic'){
    const text = G.soundMode ? (AR_SOUND[it.ch]||it.ch) : (AR_NAME[it.ch]||it.ch);
    // use embedded audio for letter NAMES, GT for sounds
    const b64key = G.soundMode ? null : it.ch;
    _speak(text, 'ar', b64key);
  } else if(G.cat==='english'){
    _speak(it.ch, 'en', null);
  } else {
    const text = isEn ? (EN_NUM[it.ch]||it.en) : (AR_NUM[it.ch]||it.ar);
    _speak(text, isEn?'en':'ar', null);
  }
}

function speakWord(){
  if(!G.current) return;
  // English tab → always English; others → follow G.lang
  const isEn = G.cat==='english' || G.lang==='en';
  const text = isEn ? G.current.en : G.current.ar;
  _speak(text, isEn?'en':'ar', null);
  const btn = document.getElementById('wordBtn');
  btn.classList.remove('pop');
  requestAnimationFrame(()=>btn.classList.add('pop'));
  setTimeout(()=>btn.classList.remove('pop'),400);
}


/* ══════════════════════════════════════
   FX
══════════════════════════════════════ */
function confetti(n=20,x,y){
  const c=['#ef4444','#f97316','#10b981','#3b82f6','#f59e0b','#8b5cf6','#ec4899','#06b6d4'];
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='cf';
    const w=5+Math.random()*9, h=7+Math.random()*12;
    const lx=x!=null?(x+(Math.random()-.5)*130)+'px':Math.random()*100+'vw';
    el.style.cssText=`left:${lx};top:${y!=null?y+'px':'-18px'};width:${w}px;height:${h}px;background:${c[i%c.length]};animation-duration:${1.1+Math.random()*1.3}s;animation-delay:${Math.random()*.22}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2600);
  }
}
function ripple(x,y,color){
  const el=document.createElement('div');el.className='ripple-ring';
  el.style.cssText=`left:${x}px;top:${y}px;width:64px;height:64px;border-color:${color};opacity:.7`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),560);
}

/* ══════════════════════════════════════
   WORD BAR  update
══════════════════════════════════════ */
function setCurrentItem(it){
  G.current=it;
  const isEn = G.cat==='english' || G.lang==='en';
  document.getElementById('wbText').textContent=isEn?it.en:it.ar;
}

/* ══════════════════════════════════════
   GRID
══════════════════════════════════════ */
function buildGrid(){
  const wrap=document.getElementById('gridView');
  wrap.innerHTML='';
  // numbers: force 10-per-row class
  wrap.classList.toggle('cat-numbers', G.cat==='numbers');
  const list=DATA[G.cat];
  // set first as default word bar
  if(list.length) setCurrentItem(list[0]);
  list.forEach((it,i)=>{
    const card=document.createElement('div');
    card.className='letter-card';
    card.style.setProperty('--cc',it.color);
    const word=(G.cat==='english'||G.lang==='en')?it.en:it.ar;
    card.innerHTML=`<div class="lc-char">${it.ch}</div><div class="lc-word">${word}</div>`;
    card.addEventListener('pointerdown',e=>{
      e.stopPropagation();onGridClick(it,card,e);
    });
    wrap.appendChild(card);
  });
}

let _gT=null;
function onGridClick(it,card,e){
  ripple(e.clientX,e.clientY,it.color);
  confetti(16,e.clientX,e.clientY);
  document.querySelectorAll('.letter-card.lit,.letter-card.pop').forEach(c=>c.classList.remove('lit','pop'));
  card.classList.add('lit','pop');
  clearTimeout(_gT);
  _gT=setTimeout(()=>card.classList.remove('lit','pop'),1700);
  setCurrentItem(it);
  speakLetter(it);
}

/* ══════════════════════════════════════
   STRIP
══════════════════════════════════════ */
function buildStrip(){
  const list=DATA[G.cat],total=list.length,idx=G.stripIdx;
  setCurrentItem(list[idx]);

  // dots
  const dw=document.getElementById('stripDots');
  const maxD=Math.min(total,20);
  const off=Math.max(0,Math.min(idx-Math.floor(maxD/2),total-maxD));
  dw.innerHTML='';
  for(let i=0;i<Math.min(maxD,total);i++){
    const d=document.createElement('div');
    d.className='strip-dot'+(i+off===idx?' on':'');
    dw.appendChild(d);
  }

  // 5 cards
  const track=document.getElementById('stripTrack');
  track.innerHTML='';
  [['pos-far',-2],['pos-near',-1],['pos-center',0],['pos-near',1],['pos-far',2]].forEach(([cls,o])=>{
    const ci=idx+o;
    const slot=document.createElement('div');
    slot.className=`strip-slot ${cls}`;
    if(ci<0||ci>=total){slot.style.opacity='0';slot.style.pointerEvents='none';track.appendChild(slot);return;}
    const it=list[ci];
    slot.style.setProperty('--cc',it.color);

    // letter card
    const lc=document.createElement('div');
    lc.className='strip-card';
    lc.style.setProperty('--cc',it.color);
    const word=(G.cat==='english'||G.lang==='en')?it.en:it.ar;
    lc.innerHTML=`<div class="sc-char">${it.ch}</div><div class="sc-word">${word}</div>`;
    lc.addEventListener('pointerdown',e=>{e.stopPropagation();onStripClick(ci,slot,e);});

    // image card
    const ic=document.createElement('div');
    ic.className='strip-img-card';
    ic.style.setProperty('--cc',it.color);
    const ikey=G.cat==='arabic'?`ar_${it.ch}`:G.cat==='english'?`en_${it.ch}`:`num_${it.ch}`;
    const imgSrc=IMGS[ikey];
    if(!imgSrc){
      // nothing
    } else if(imgSrc.startsWith('<svg')){
      ic.innerHTML=imgSrc;
    } else {
      // base64 JPEG or URL
      const im=document.createElement('img');
      im.src=imgSrc;
      im.alt=it.ar||it.ch;
      im.style.cssText='width:100%;height:100%;object-fit:contain;display:block;padding:4px';
      im.onerror=()=>{ic.style.opacity='0';};
      ic.appendChild(im);
    }
    ic.addEventListener('pointerdown',e=>{e.stopPropagation();onStripClick(ci,slot,e);});

    slot.appendChild(lc);
    slot.appendChild(ic);
    track.appendChild(slot);
  });

  document.getElementById('stripCounter').textContent=`${idx+1}/${total}`;
  document.getElementById('prevBtn').disabled=idx<=0;
  document.getElementById('nextBtn').disabled=idx>=total-1;
}

function onStripClick(ci,slot,e){
  const it=DATA[G.cat][ci];
  ripple(e.clientX,e.clientY,it.color);
  if(slot.classList.contains('pos-center')){
    confetti(18,e.clientX,e.clientY);
    // pulse the letter card inside slot
    const lc=slot.querySelector('.strip-card');
    if(lc){lc.classList.add('speaking');setTimeout(()=>lc.classList.remove('speaking'),500);}
    speakLetter(it);
  } else {
    G.stripIdx=ci; buildStrip();
    setTimeout(()=>speakLetter(DATA[G.cat][G.stripIdx]),100);
  }
}

function stripMove(dir){
  const total=DATA[G.cat].length;
  const newIdx=Math.max(0,Math.min(total-1,G.stripIdx+dir));
  if(newIdx===G.stripIdx) return;   // Fix #9: at boundary, do nothing
  G.stripIdx=newIdx;
  buildStrip();
  confetti(8);
  speakLetter(DATA[G.cat][G.stripIdx]);
}

/* ══════════════════════════════════════
   VIEW
══════════════════════════════════════ */
function toggleView(){
  G.view=G.view==='grid'?'strip':'grid';
  applyView();
}
function applyView(){
  const gv=document.getElementById('gridView');
  const sv=document.getElementById('stripView');
  const vb=document.getElementById('viewBtn');
  if(G.view==='strip'){
    gv.style.display='none'; sv.style.display='flex';
    vb.textContent='⊞'; vb.classList.add('on');
    buildStrip();
  } else {
    gv.style.display='grid'; sv.style.display='none';
    vb.textContent='☰'; vb.classList.remove('on');
    buildGrid();
  }
}

/* ══════════════════════════════════════
   CAT & LANG
══════════════════════════════════════ */
function switchCat(cat){
  G.cat=cat; G.stripIdx=0;
  document.querySelectorAll('.cat-tab').forEach(t=>{
    t.classList.toggle('on',t.dataset.cat===cat);
  });
  _stopAudio();
  // Fix #3: show soundMode btn only for arabic
  const sb=document.getElementById('soundBtn');
  sb.style.display = cat==='arabic' ? 'flex' : 'none';
  applyView();
}
function toggleSoundMode(){
  G.soundMode = !G.soundMode;
  const btn = document.getElementById('soundBtn');
  if(G.lang==='ar'){
    btn.textContent = G.soundMode ? 'بَ' : 'باء';
  } else {
    btn.textContent = G.soundMode ? 'buh' : 'Ba';
  }
  btn.classList.toggle('on', G.soundMode);
  // clear arabic cache so next click uses new mode
  Object.keys(_cache).forEach(k=>{ if(k.startsWith('ar|')) delete _cache[k]; });
}
function toggleLang(){
  G.lang=G.lang==='ar'?'en':'ar';
  document.getElementById('langBtn').textContent=G.lang==='ar'?'ع':'A';
  // Fix #7: update soundMode button text to match new lang
  const sb=document.getElementById('soundBtn');
  sb.textContent = G.soundMode
    ? (G.lang==='ar'?'بَ':'buh')
    : (G.lang==='ar'?'باء':'Ba');
  _stopAudio();
  applyView();
}

/* ══════════════════════════════════════
   THEMES + ANIMATED BACKGROUNDS
══════════════════════════════════════ */
const BG={
  ocean(l){
    for(let i=0;i<22;i++){
      const b=document.createElement('div');b.className='bubble-p';
      const s=12+Math.random()*42;
      b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${7+Math.random()*12}s;animation-delay:${Math.random()*10}s`;
      l.appendChild(b);
    }
  },
  cosmic(l){
    for(let i=0;i<100;i++){
      const s=document.createElement('div');s.className='star-p';
      const sz=.8+Math.random()*2.2;
      s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${1.4+Math.random()*2.4}s;animation-delay:${Math.random()*3}s`;
      l.appendChild(s);
    }
    // Fix #4: use a flag tied to this bgLayer instance
    let active=true;
    l._stopBg=()=>{active=false;};
    const shootLoop=()=>{
      if(!active) return;
      const s=document.createElement('div');s.className='shoot-p';
      s.style.cssText=`top:${Math.random()*65}%;left:${Math.random()*75}%;animation-duration:${.55+Math.random()*.45}s`;
      l.appendChild(s);setTimeout(()=>s.remove(),1100);
      setTimeout(shootLoop,1800+Math.random()*1500);
    };
    setTimeout(shootLoop,800);
  },
  spring(l){
    const cols=['#f9a8d4','#fda4af','#fbcfe8','#f0abfc','#c4b5fd','#a5f3fc'];
    for(let i=0;i<30;i++){
      const p=document.createElement('div');p.className='petal-p';
      const s=8+Math.random()*14;
      p.style.cssText=`width:${s}px;height:${s*.65}px;left:${Math.random()*105}%;background:${cols[i%cols.length]};animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*10}s`;
      l.appendChild(p);
    }
  },
  sunset(l){
    const cols=['#fbbf24','#f97316','#ef4444','#fb923c','#fde68a'];
    for(let i=0;i<32;i++){
      const e=document.createElement('div');e.className='ember-p';
      const s=3+Math.random()*8;
      e.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${cols[i%cols.length]};animation-duration:${4+Math.random()*7}s;animation-delay:${Math.random()*6}s;opacity:.85`;
      l.appendChild(e);
    }
  },
  candy(l){
    const cols=['#f9a8d4','#a78bfa','#93c5fd','#6ee7b7','#fde68a','#fca5a5','#c4b5fd'];
    for(let i=0;i<22;i++){
      const b=document.createElement('div');b.className='candy-p';
      const s=22+Math.random()*65;
      b.style.cssText=`width:${s}px;height:${s}px;top:${5+Math.random()*85}%;left:${Math.random()*100}%;background:${cols[i%cols.length]};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2.5}s`;
      l.appendChild(b);
    }
  },
  jungle(l){
    for(let i=0;i<20;i++){
      const f=document.createElement('div');f.className='firefly-p';
      const s=4+Math.random()*5;
      f.style.cssText=`width:${s}px;height:${s}px;top:${10+Math.random()*78}%;left:${Math.random()*100}%;animation-duration:${2.2+Math.random()*3.5}s;animation-delay:${Math.random()*4}s`;
      l.appendChild(f);
    }
    for(let i=0;i<18;i++){
      const leaf=document.createElement('div');leaf.className='leaf-p';
      leaf.style.cssText=`left:${Math.random()*105}%;animation-duration:${9+Math.random()*11}s;animation-delay:${Math.random()*9}s`;
      l.appendChild(leaf);
    }
  },
  arctic(l){
    const fl=['❄','❅','❆','✦','✧','*'];
    for(let i=0;i<38;i++){
      const s=document.createElement('div');s.className='snow-p';
      s.textContent=fl[i%fl.length];
      const fs=9+Math.random()*17;
      s.style.cssText=`font-size:${fs}px;left:${Math.random()*105}%;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*10}s`;
      l.appendChild(s);

};

const T_CLASS={ocean:'',cosmic:'t-cosmic',spring:'t-spring',sunset:'t-sunset',candy:'t-candy',jungle:'t-jungle',arctic:'t-arctic'};

function setTheme(name){
  const body=document.body;
  Object.values(T_CLASS).forEach(c=>{if(c) body.classList.remove(c);});
  if(T_CLASS[name]) body.classList.add(T_CLASS[name]);
  G.theme=name;
  document.querySelectorAll('.th-btn').forEach(b=>b.classList.toggle('on',b.dataset.t===name));
  const l=document.getElementById('bgLayer');
  if(l._stopBg){ l._stopBg(); l._stopBg=null; }   // Fix #4: kill old loop
  l.innerHTML='';
  if(BG[name]) BG[name](l);
}

/* ══════════════════════════════════════
   KEYBOARD
══════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(G.view==='strip'){
    if(e.key==='ArrowLeft'){stripMove(+1);e.preventDefault();}
    else if(e.key==='ArrowRight'){stripMove(-1);e.preventDefault();}
    else if(e.key===' '||e.key==='Enter'){
      speakLetter(DATA[G.cat][G.stripIdx]);
      const sl=document.querySelector('.strip-slot.pos-center');
      if(sl){const lc=sl.querySelector('.strip-card');if(lc){lc.classList.add('speaking');setTimeout(()=>lc.classList.remove('speaking'),500);}}
      confetti(12);e.preventDefault();
    }
  }
  if(e.key==='w'||e.key==='W') speakWord();
});

/* ═══════════════════════════════════════════════════════════
   PWA — Install button + Service Worker registration
═══════════════════════════════════════════════════════════ */
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'none';
});
async function pwaInstall(){
  if(!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const { outcome } = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  if(outcome === 'accepted')
    document.getElementById('installBtn').style.display = 'none';
}
if('serviceWorker' in navigator)
  window.addEventListener('load', ()=> navigator.serviceWorker.register('sw.js').catch(()=>{}));

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded',()=>{
  setTheme('ocean');
  buildGrid();
});
</script>
